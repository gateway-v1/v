<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    </style>
</head>
<body>
    <div>Redirecting you to your folder...</div>

    <script>
    function doRedirect() {
        const now = new Date().getTime();
        const expiryTime = 20 * 60 * 1000; // 20 minutes in milliseconds
        
        let count = localStorage.getItem("click_count") || 0;
        let startTime = localStorage.getItem("start_time") || 0;

        // RESET LOGIC: If 20 mins passed, clear the history
        if (startTime && (now - startTime > expiryTime)) {
            localStorage.removeItem("click_count");
            localStorage.removeItem("start_time");
            count = 0;
        }

        count = parseInt(count);

        if (count === 0) {
            // FIRST CLICK: Save time, show Ad 1
            localStorage.setItem("click_count", "1");
            localStorage.setItem("start_time", now);
            window.location.href = "PASTE_YOUR_AD_LINK_1_HERE";
        } else if (count === 1) {
            // SECOND CLICK: Show Ad 2
            localStorage.setItem("click_count", "2");
            window.location.href = "PASTE_YOUR_AD_LINK_2_HERE";
        } else {
            // FINAL: Show the Google Drive link
            window.location.href = "PASTE_YOUR_DRIVE_LINK_HERE";
        }
    }

    // Run the function immediately
    doRedirect();
    </script>
</body>
</html>
