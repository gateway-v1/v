<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
    </style>
</head>
<body>
    <div>Verifying connection... Please wait.</div>

    <script>
    function doRedirect() {
        const now = new Date().getTime();
        const expiryTime = 20 * 60 * 1000; // 20 Minutes
        
        let count = localStorage.getItem("click_count") || 0;
        let startTime = localStorage.getItem("start_time") || 0;

        // Reset logic: If 20 mins passed, user must see ads again
        if (startTime && (now - startTime > expiryTime)) {
            localStorage.removeItem("click_count");
            localStorage.removeItem("start_time");
            count = 0;
        }

        count = parseInt(count);

        // YOUR SPECIFIC LINKS
        const adLink = "https://www.profitablecpmratenetwork.com/bqkav38q?key=9d978dc85f9832760e79eff2a613445e";
        const driveLink = "https://drive.google.com/drive/folders/10E_Urqh_jsuBy5iJvUSnQ0O3a9yq-4VS";

        if (count === 0) {
            // Click 1: Goes to CPM link
            localStorage.setItem("click_count", "1");
            localStorage.setItem("start_time", now);
            window.location.href = adLink;
        } else if (count === 1) {
            // Click 2: Goes to CPM link again
            localStorage.setItem("click_count", "2");
            window.location.href = adLink;
        } else {
            // Click 3+: Goes to Google Drive (Lasts for 20 mins)
            window.location.href = driveLink;
        }
    }
    doRedirect();
    </script>
</body>
</html>
